<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#005587" />
    <meta name="color-scheme" content="light" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="UCLA MRI" />
    <!-- black-translucent lets the standalone web view extend under the status bar,
         which is what the viewport-fit=cover + env(safe-area-inset-top) padding in
         the layouts already assumes. With "default" iOS reserves an opaque status
         bar, leaving a seam above the branded header. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>UCLA Sports MRI Courses</title>
    <meta name="description" content="Interactive, case-based knee, shoulder, hip, and elbow MRI training for sports medicine fellows and residents." />

    <!-- Open Graph (iMessage, Facebook, LinkedIn, Slack) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="UCLA Sports MRI Courses" />
    <meta property="og:title" content="UCLA Sports MRI Courses" />
    <meta property="og:description" content="Interactive, case-based knee, shoulder, hip, and elbow MRI training for sports medicine fellows and residents." />
    <meta property="og:url" content="https://jeremyswisherkneemri.com/" />
    <meta property="og:image" content="https://jeremyswisherkneemri.com/og-image.jpg" />
    <meta property="og:image:secure_url" content="https://jeremyswisherkneemri.com/og-image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="UCLA Sports Medicine — Knee, Shoulder, Hip, and Elbow MRI Courses" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="UCLA Sports MRI Courses" />
    <meta name="twitter:description" content="Interactive, case-based knee, shoulder, hip, and elbow MRI training for sports medicine fellows and residents." />
    <meta name="twitter:image" content="https://jeremyswisherkneemri.com/og-image.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
