<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">UCLA Sports MRI app icon</title>
  <desc id="desc">Premium UCLA Sports MRI home-screen icon with a dark MRI scan window, MSK imaging arcs, and MRI letters.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="20" x2="444" y2="492" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#002F4E"/>
      <stop offset="0.55" stop-color="#005587"/>
      <stop offset="1" stop-color="#2774AE"/>
    </linearGradient>
    <radialGradient id="glow" cx="68%" cy="20%" r="70%">
      <stop offset="0" stop-color="#8BB8E8" stop-opacity="0.38"/>
      <stop offset="0.58" stop-color="#2774AE" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#002F4E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screen" x1="118" y1="104" x2="394" y2="338" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D2A36"/>
      <stop offset="0.56" stop-color="#071725"/>
      <stop offset="1" stop-color="#31495F"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#001B2D" flood-opacity="0.38"/>
    </filter>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#001B2D" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#glow)"/>
  <circle cx="398" cy="100" r="126" fill="#8BB8E8" opacity="0.12"/>
  <circle cx="91" cy="407" r="116" fill="#FFD100" opacity="0.07"/>
