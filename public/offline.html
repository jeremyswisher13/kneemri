<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#005587" />
    <title>Offline · UCLA Sports MRI Courses</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f5;
        color: #111827;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        max-width: 430px;
        border: 1px solid #dbe3ea;
        border-radius: 16px;
        background: white;
        padding: 24px;
        box-shadow: 0 10px 30px rgb(15 23 42 / 0.08);
      }
      .badge {
        display: inline-flex;
        border-radius: 999px;
        background: #daebfe;
        color: #005587;
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      h1 {
        margin: 14px 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: #4b5563;
        line-height: 1.5;
      }
      a {
        display: inline-flex;
        margin-top: 18px;
        border-radius: 10px;
        background: #2774ae;
        color: white;
        padding: 10px 14px;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Offline</span>
      <h1>Reconnect to keep learning.</h1>
      <p>
        The app shell and previously opened pages may still work offline. MRI images load best once
        your connection returns.
      </p>
      <a href="/">Try the app again</a>
    </main>
  </body>
</html>
