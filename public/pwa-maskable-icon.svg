    <path d="M215 140v162" stroke="#D7EAF8" stroke-width="3" stroke-linecap="round" opacity="0.09"/>
    <path d="M256 140v162" stroke="#D7EAF8" stroke-width="3" stroke-linecap="round" opacity="0.18"/>
    <path d="M297 140v162" stroke="#D7EAF8" stroke-width="3" stroke-linecap="round" opacity="0.09"/>
    <path d="M338 140v162" stroke="#D7EAF8" stroke-width="3" stroke-linecap="round" opacity="0.13"/>
    <path d="M150 239c26-48 61-72 106-72s80 24 106 72" fill="none" stroke="#FFD100" stroke-width="25" stroke-linecap="round"/>
    <path d="M158 270c30 26 63 39 98 39s68-13 98-39" fill="none" stroke="#D7EAF8" stroke-width="17" stroke-linecap="round"/>
    <circle cx="256" cy="231" r="44" fill="#2774AE" opacity="0.78"/>
