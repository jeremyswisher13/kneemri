    <circle cx="370" cy="140" r="4.5" fill="#8BB8E8"/>
  </g>
  <g filter="url(#textShadow)">
    <text x="256" y="429" fill="#FFFFFF" font-family="Arial Black, Arial, sans-serif" font-size="76" font-weight="900" text-anchor="middle" letter-spacing="0">MRI</text>
    <path d="M196 449h120" stroke="#FFD100" stroke-width="13" stroke-linecap="round"/>
