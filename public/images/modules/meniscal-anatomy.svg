<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 620" width="700" height="620" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#005587"/>
    </marker>
  </defs>

  <!-- Title -->
  <rect x="0" y="0" width="700" height="50" fill="#005587" rx="4"/>
  <text x="350" y="33" text-anchor="middle" fill="white" font-size="20" font-weight="bold">Meniscal Anatomy: Tibial Plateau (Superior View)</text>

  <!-- Tibial plateau outline -->
  <ellipse cx="350" cy="320" rx="260" ry="200" fill="#DAEBFE" stroke="#005587" stroke-width="2.5"/>
  <text x="350" y="540" text-anchor="middle" fill="#005587" font-size="14" font-weight="bold">TIBIAL PLATEAU</text>

  <!-- Orientation labels -->
  <text x="350" y="100" text-anchor="middle" fill="#005587" font-size="13" font-weight="bold">ANTERIOR</text>
  <text x="350" y="548" text-anchor="middle" fill="#005587" font-size="13" font-weight="bold">POSTERIOR</text>
  <text x="80" y="325" text-anchor="middle" fill="#005587" font-size="13" font-weight="bold">LATERAL</text>
  <text x="620" y="325" text-anchor="middle" fill="#005587" font-size="13" font-weight="bold">MEDIAL</text>

  <!-- Intercondylar eminence -->
  <ellipse cx="350" cy="310" rx="45" ry="55" fill="#B8D4E8" stroke="#005587" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="350" y="305" text-anchor="middle" fill="#005587" font-size="9">Intercondylar</text>
  <text x="350" y="317" text-anchor="middle" fill="#005587" font-size="9">Eminence</text>

  <!-- LATERAL MENISCUS (more O-shaped/circular, left side) -->
  <path d="M 200,180
           C 140,200 110,280 115,330
           C 120,380 150,440 210,470
           C 250,488 290,475 310,440
           C 320,420 310,380 305,350
           C 300,310 310,270 310,240
           C 310,210 300,190 270,175
           C 245,165 220,170 200,180 Z"
        fill="#2774AE" fill-opacity="0.4" stroke="#2774AE" stroke-width="2.5"/>

  <!-- Lateral meniscus inner edge (more circular shape) -->
  <path d="M 220,210
           C 180,225 160,290 165,330
           C 170,370 190,420 230,440
           C 255,452 275,440 285,420
           C 290,405 285,370 280,345
           C 275,315 280,280 280,255
           C 280,235 270,218 250,208
           C 240,203 230,205 220,210 Z"
        fill="#DAEBFE" stroke="#2774AE" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- MEDIAL MENISCUS (more C-shaped, right side, wider posterior horn) -->
  <path d="M 490,175
           C 520,165 550,170 570,190
           C 595,215 610,260 610,310
           C 610,370 590,420 560,455
           C 530,488 490,500 450,485
           C 425,475 410,450 405,420
           C 400,395 405,365 405,340
           C 405,290 400,245 405,215
           C 410,195 430,178 460,172
           C 470,170 480,170 490,175 Z"
        fill="#2774AE" fill-opacity="0.55" stroke="#2774AE" stroke-width="2.5"/>

  <!-- Medial meniscus inner edge -->
  <path d="M 475,210
           C 500,200 520,205 535,220
           C 555,240 565,275 565,315
           C 565,360 550,400 530,425
           C 510,448 485,455 465,448
           C 448,440 438,420 435,400
           C 430,375 435,350 435,330
           C 435,290 432,255 435,235
           C 438,220 455,210 475,210 Z"
        fill="#DAEBFE" stroke="#2774AE" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Popliteal Hiatus (gap in posterolateral lateral meniscus) -->
  <line x1="165" y1="395" x2="195" y2="425" stroke="#DAEBFE" stroke-width="6"/>
  <path d="M 140,410 C 155,395 165,400 175,415" stroke="none" fill="#DAEBFE"/>

  <!-- Transverse ligament connecting anterior horns -->
  <path d="M 270,185 C 290,160 370,155 420,170" fill="none" stroke="#FFD100" stroke-width="3" stroke-linecap="round"/>

  <!-- MCL attachment band on medial meniscus -->
  <rect x="600" y="285" width="18" height="65" fill="#FFD100" fill-opacity="0.5" stroke="#FFD100" stroke-width="1.5" rx="4"/>

  <!-- ACL/PCL attachment areas (small marks) -->
  <circle cx="340" cy="275" r="6" fill="#005587" fill-opacity="0.4" stroke="#005587" stroke-width="1"/>
  <text x="340" y="267" text-anchor="middle" fill="#005587" font-size="8">ACL</text>
  <circle cx="360" cy="350" r="6" fill="#005587" fill-opacity="0.4" stroke="#005587" stroke-width="1"/>
  <text x="360" y="365" text-anchor="middle" fill="#005587" font-size="8">PCL</text>

  <!-- LABELS - Lateral Meniscus -->
  <!-- Anterior horn -->
  <line x1="235" y1="190" x2="160" y2="135" stroke="#005587" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="60" y="120" width="105" height="22" fill="white" stroke="#2774AE" stroke-width="1" rx="3"/>
  <text x="112" y="135" text-anchor="middle" fill="#2774AE" font-size="11" font-weight="bold">Anterior Horn</text>

  <!-- Body lateral -->
  <line x1="125" y1="310" x2="55" y2="290" stroke="#005587" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="15" y="275" width="50" height="22" fill="white" stroke="#2774AE" stroke-width="1" rx="3"/>
  <text x="40" y="290" text-anchor="middle" fill="#2774AE" font-size="11" font-weight="bold">Body</text>

  <!-- Posterior horn lateral -->
  <line x1="220" y1="460" x2="155" y2="490" stroke="#005587" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="55" y="480" width="110" height="22" fill="white" stroke="#2774AE" stroke-width="1" rx="3"/>
  <text x="110" y="495" text-anchor="middle" fill="#2774AE" font-size="11" font-weight="bold">Posterior Horn</text>

  <!-- Root attachments lateral -->
  <circle cx="255" cy="178" r="4" fill="#FFD100" stroke="#005587" stroke-width="1.5"/>
  <line x1="255" y1="178" x2="255" y2="143" stroke="#005587" stroke-width="1"/>
  <text x="255" y="139" text-anchor="middle" fill="#005587" font-size="9">Ant. Root</text>

  <circle cx="260" cy="460" r="4" fill="#FFD100" stroke="#005587" stroke-width="1.5"/>
  <line x1="260" y1="460" x2="260" y2="498" stroke="#005587" stroke-width="1"/>
  <text x="260" y="510" text-anchor="middle" fill="#005587" font-size="9">Post. Root</text>

  <!-- Popliteal hiatus label -->
  <line x1="152" y1="415" x2="90" y2="440" stroke="#005587" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="10" y="430" width="90" height="22" fill="white" stroke="#FFD100" stroke-width="1.5" rx="3"/>
  <text x="55" y="445" text-anchor="middle" fill="#005587" font-size="10" font-weight="bold">Popliteal Hiatus</text>

  <!-- LABELS - Medial Meniscus -->
  <!-- Anterior horn medial -->
  <line x1="460" y1="180" x2="520" y2="130" stroke="#005587" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="510" y="115" width="105" height="22" fill="white" stroke="#2774AE" stroke-width="1" rx="3"/>
  <text x="562" y="130" text-anchor="middle" fill="#2774AE" font-size="11" font-weight="bold">Anterior Horn</text>

  <!-- Body medial -->
  <line x1="600" y1="310" x2="645" y2="295" stroke="#005587" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="635" y="282" width="50" height="22" fill="white" stroke="#2774AE" stroke-width="1" rx="3"/>
  <text x="660" y="297" text-anchor="middle" fill="#2774AE" font-size="11" font-weight="bold">Body</text>

  <!-- Posterior horn medial (wider) -->
  <line x1="480" y1="478" x2="540" y2="500" stroke="#005587" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="490" y="492" width="135" height="22" fill="white" stroke="#2774AE" stroke-width="1" rx="3"/>
  <text x="557" y="507" text-anchor="middle" fill="#2774AE" font-size="11" font-weight="bold">Posterior Horn (wider)</text>

  <!-- Root attachments medial -->
  <circle cx="445" cy="175" r="4" fill="#FFD100" stroke="#005587" stroke-width="1.5"/>
  <line x1="445" y1="175" x2="445" y2="143" stroke="#005587" stroke-width="1"/>
  <text x="445" y="139" text-anchor="middle" fill="#005587" font-size="9">Ant. Root</text>

  <circle cx="445" cy="480" r="4" fill="#FFD100" stroke="#005587" stroke-width="1.5"/>
  <line x1="445" y1="480" x2="420" y2="510" stroke="#005587" stroke-width="1"/>
  <text x="420" y="522" text-anchor="middle" fill="#005587" font-size="9">Post. Root</text>

  <!-- MCL label -->
  <line x1="618" y1="317" x2="660" y2="350" stroke="#005587" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="630" y="342" width="65" height="34" fill="white" stroke="#FFD100" stroke-width="1.5" rx="3"/>
  <text x="662" y="356" text-anchor="middle" fill="#005587" font-size="10" font-weight="bold">MCL</text>
  <text x="662" y="369" text-anchor="middle" fill="#005587" font-size="9">Attachment</text>

  <!-- Transverse ligament label -->
  <line x1="340" y1="160" x2="340" y2="85" stroke="#005587" stroke-width="1"/>
  <rect x="268" y="68" width="148" height="22" fill="white" stroke="#FFD100" stroke-width="1.5" rx="3"/>
  <text x="342" y="83" text-anchor="middle" fill="#005587" font-size="10" font-weight="bold">Transverse Ligament</text>

  <!-- Meniscus identity labels (solid blue for legibility; previously faint white watermark-style text) -->
  <text x="190" y="320" text-anchor="middle" fill="#005587" font-size="12" font-weight="bold">LATERAL</text>
  <text x="520" y="330" text-anchor="middle" fill="#005587" font-size="12" font-weight="bold">MEDIAL</text>

  <!-- Shape note -->
  <text x="190" y="338" text-anchor="middle" fill="#005587" font-size="9" font-style="italic">(more O-shaped)</text>
  <text x="520" y="348" text-anchor="middle" fill="#005587" font-size="9" font-style="italic">(more C-shaped)</text>

  <!-- Legend -->
  <rect x="10" y="570" width="680" height="42" fill="#f8f9fa" stroke="#005587" stroke-width="1" rx="4"/>
  <circle cx="30" cy="591" r="8" fill="#2774AE" fill-opacity="0.4" stroke="#2774AE" stroke-width="1.5"/>
  <text x="45" y="595" fill="#005587" font-size="10">Lateral Meniscus</text>
  <circle cx="170" cy="591" r="8" fill="#2774AE" fill-opacity="0.55" stroke="#2774AE" stroke-width="1.5"/>
  <text x="185" y="595" fill="#005587" font-size="10">Medial Meniscus</text>
  <rect x="300" y="583" width="16" height="16" fill="#FFD100" fill-opacity="0.5" stroke="#FFD100" stroke-width="1" rx="2"/>
  <text x="322" y="595" fill="#005587" font-size="10">MCL / Key Structure</text>
  <circle cx="480" cy="591" r="4" fill="#FFD100" stroke="#005587" stroke-width="1.5"/>
  <text x="490" y="595" fill="#005587" font-size="10">Root Attachment</text>
</svg>