<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 870 480" width="870" height="480" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="tearArrow" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#cc3333"/>
    </marker>
  </defs>

  <!-- Title -->
  <rect x="0" y="0" width="870" height="50" fill="#005587" rx="4"/>
  <text x="435" y="33" text-anchor="middle" fill="white" font-size="20" font-weight="bold">Meniscal Tear Types</text>

  <!-- 5 panels -->
  <!-- Panel 1: Horizontal -->
  <rect x="12" y="60" width="148" height="410" fill="#f8f9fa" stroke="#DAEBFE" stroke-width="1.5" rx="8"/>
  <rect x="22" y="70" width="128" height="28" fill="#2774AE" rx="4"/>
  <text x="86" y="89" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Horizontal</text>

  <!-- Meniscus cross-section with horizontal tear -->
  <g transform="translate(86, 195)">
    <path d="M -50,40 L 0,-50 L 50,40 Z" fill="#DAEBFE" stroke="#005587" stroke-width="2"/>
    <!-- Horizontal cleavage line -->
    <line x1="-35" y1="10" x2="35" y2="10" stroke="#cc3333" stroke-width="2.5" stroke-dasharray="0"/>
    <!-- Tear indication -->
    <path d="M -30,12 C -20,18 -10,20 0,18 C 10,16 20,14 30,12" fill="none" stroke="#cc3333" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
  <text x="86" y="270" text-anchor="middle" fill="#cc3333" font-size="10" font-weight="bold">(Cleavage)</text>
  <text x="86" y="300" text-anchor="middle" fill="#005587" font-size="9">Splits meniscus into</text>
  <text x="86" y="314" text-anchor="middle" fill="#005587" font-size="9">superior &amp; inferior</text>
  <text x="86" y="328" text-anchor="middle" fill="#005587" font-size="9">leaves</text>
  <line x1="30" y1="345" x2="142" y2="345" stroke="#DAEBFE" stroke-width="1"/>
  <text x="86" y="365" text-anchor="middle" fill="#005587" font-size="9" font-style="italic">Common in</text>
  <text x="86" y="379" text-anchor="middle" fill="#005587" font-size="9" font-style="italic">degenerative tears</text>
  <text x="86" y="393" text-anchor="middle" fill="#005587" font-size="9" font-style="italic">Often medial, older</text>
  <text x="86" y="407" text-anchor="middle" fill="#005587" font-size="9" font-style="italic">patients</text>
  <!-- Associated parameniscal cyst note -->
  <rect x="22" y="420" width="128" height="30" fill="#FFD100" fill-opacity="0.2" stroke="#FFD100" stroke-width="1" rx="3"/>
  <text x="86" y="438" text-anchor="middle" fill="#005587" font-size="8" font-weight="bold">May form parameniscal cyst</text>

  <!-- Panel 2: Vertical Longitudinal -->
  <rect x="170" y="60" width="148" height="410" fill="#f8f9fa" stroke="#DAEBFE" stroke-width="1.5" rx="8"/>
  <rect x="180" y="70" width="128" height="28" fill="#2774AE" rx="4"/>
  <text x="244" y="89" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Vertical Longitudinal</text>

  <!-- Top-down meniscus view with vertical longitudinal tear -->
  <g transform="translate(244, 190)">
    <!-- C-shaped meniscus top-down -->
    <path d="M -45,-35 C -55,-20 -55,20 -45,35 C -35,48 -10,50 10,45 C 25,42 40,30 45,15 C 50,0 50,-15 45,-25 C 38,-35 25,-42 10,-45 C -10,-48 -35,-45 -45,-35 Z" fill="#DAEBFE" stroke="#005587" stroke-width="2"/>
    <path d="M -25,-22 C -30,-10 -30,10 -25,22 C -20,30 -5,32 10,28 C 20,25 28,15 30,5 C 32,-5 30,-15 28,-20 C 23,-27 15,-30 5,-30 C -10,-28 -22,-28 -25,-22 Z" fill="white" stroke="#005587" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Longitudinal tear line (parallel to circumference) -->
    <path d="M -38,-28 C -42,-12 -42,12 -38,28" stroke="#cc3333" stroke-width="2.5" fill="none"/>
  </g>
  <text x="244" y="270" text-anchor="middle" fill="#005587" font-size="9">Tear runs parallel to</text>
  <text x="244" y="284" text-anchor="middle" fill="#005587" font-size="9">meniscal circumference</text>
  <text x="244" y="298" text-anchor="middle" fill="#005587" font-size="9">(long axis)</text>
  <line x1="188" y1="315" x2="300" y2="315" stroke="#DAEBFE" stroke-width="1"/>
  <text x="244" y="335" text-anchor="middle" fill="#005587" font-size="9" font-style="italic">Traumatic in young</text>
  <text x="244" y="349" text-anchor="middle" fill="#005587" font-size="9" font-style="italic">patients</text>
  <text x="244" y="363" text-anchor="middle" fill="#005587" font-size="9" font-style="italic">May extend to become</text>
  <text x="244" y="377" text-anchor="middle" fill="#005587" font-size="9" font-style="italic">bucket-handle tear</text>
  <rect x="180" y="420" width="128" height="30" fill="#FFD100" fill-opacity="0.2" stroke="#FFD100" stroke-width="1" rx="3"/>
  <text x="244" y="438" text-anchor="middle" fill="#005587" font-size="8" font-weight="bold">Peripheral = repairable</text>

  <!-- Panel 3: Radial -->
  <rect x="328" y="60" width="148" height="410" fill="#f8f9fa" stroke="#DAEBFE" stroke-width="1.5" rx="8"/>
  <rect x="338" y="70" width="128" height="28" fill="#2774AE" rx="4"/>
  <text x="402" y="89" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Radial</text>

  <!-- Top-down meniscus with radial tear -->
  <g transform="translate(402, 190)">
    <path d="M -45,-35 C -55,-20 -55,20 -45,35 C -35,48 -10,50 10,45 C 25,42 40,30 45,15 C 50,0 50,-15 45,-25 C 38,-35 25,-42 10,-45 C -10,-48 -35,-45 -45,-35 Z" fill="#DAEBFE" stroke="#005587" stroke-width="2"/>
    <path d="M -25,-22 C -30,-10 -30,10 -25,22 C -20,30 -5,32 10,28 C 20,25 28,15 30,5 C 32,-5 30,-15 28,-20 C 23,-27 15,-30 5,-30 C -10,-28 -22,-28 -25,-22 Z" fill="white" stroke="#005587" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Radial tear (perpendicular to circumference) -->
    <line x1="-25" y1="0" x2="-50" y2="0" stroke="#cc3333" stroke-width="2.5"/>
  </g>
  <text x="402" y="270" text-anchor="middle" fill="#005587" font-size="9">Tear runs perpendicular</text>
  <text x="402" y="284" text-anchor="middle" fill="#005587" font-size="9">to meniscal circumference</text>
  <text x="402" y="298" text-anchor="middle" fill="#005587" font-size="9">(from free edge outward)</text>
  <line x1="346" y1="315" x2="458" y2="315" stroke="#DAEBFE" stroke-width="1"/>
  <text x="402" y="335" text-anchor="middle" fill="#005587" font-size="9" font-style="italic">Disrupts hoop stress</text>
  <text x="402" y="349" text-anchor="middle" fill="#005587" font-size="9" font-style="italic">mechanism</text>
  <text x="402" y="363" text-anchor="middle" fill="#005587" font-size="9" font-style="italic">Functionally significant</text>
  <rect x="338" y="420" width="128" height="30" fill="#FFD100" fill-opacity="0.2" stroke="#FFD100" stroke-width="1" rx="3"/>
  <text x="402" y="432" text-anchor="middle" fill="#005587" font-size="8" font-weight="bold">Cleft/truncated sign</text>
  <text x="402" y="444" text-anchor="middle" fill="#005587" font-size="8" font-weight="bold">on MRI</text>

  <!-- Panel 4: Bucket-Handle -->
  <rect x="486" y="60" width="148" height="410" fill="#f8f9fa" stroke="#DAEBFE" stroke-width="1.5" rx="8"/>
  <rect x="496" y="70" width="128" height="28" fill="#2774AE" rx="4"/>
  <text x="560" y="89" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Bucket-Handle</text>

  <!-- Top-down meniscus with displaced fragment -->
  <g transform="translate(560, 190)">
    <!-- Remaining peripheral rim -->
    <path d="M -45,-35 C -55,-20 -55,20 -45,35 C -35,48 -10,50 10,45 C 25,42 40,30 45,15 C 50,0 50,-15 45,-25 C 38,-35 25,-42 10,-45 C -10,-48 -35,-45 -45,-35 Z" fill="#DAEBFE" stroke="#005587" stroke-width="2"/>
    <!-- Inner void where fragment was -->
    <path d="M -32,-25 C -38,-10 -38,10 -32,25 C -25,35 -5,38 10,34 C 22,30 32,18 34,5 C 36,-8 34,-18 30,-23 C 24,-30 12,-34 0,-34 C -15,-32 -28,-30 -32,-25 Z" fill="white" stroke="#005587" stroke-width="1"/>
    <!-- Tear lines -->
    <path d="M -35,-28 C -40,-12 -40,12 -35,28" stroke="#cc3333" stroke-width="2" fill="none"/>
    <!-- Displaced fragment (flipped centrally) -->
    <path d="M 0,-18 C -8,-8 -8,8 0,18 C 5,22 12,18 15,10 C 18,0 18,-10 15,-15 C 10,-20 5,-20 0,-18 Z" fill="#cc3333" fill-opacity="0.25" stroke="#cc3333" stroke-width="1.5"/>
    <!-- Arrow showing displacement -->
    <path d="M -20,0 L -5,0" fill="none" stroke="#cc3333" stroke-width="1.5" marker-end="url(#tearArrow)"/>
  </g>
  <text x="560" y="268" text-anchor="middle" fill="#cc3333" font-size="9" font-weight="bold">Displaced fragment</text>
  <text x="560" y="282" text-anchor="middle" fill="#cc3333" font-size="9" font-weight="bold">flips into intercondylar notch</text>
  <line x1="504" y1="295" x2="616" y2="295" stroke="#DAEBFE" stroke-width="1"/>
  <text x="560" y="315" text-anchor="middle" fill="#005587" font-size="9" font-style="italic">Extended vertical</text>
  <text x="560" y="329" text-anchor="middle" fill="#005587" font-size="9" font-style="italic">longitudinal tear with</text>
  <text x="560" y="343" text-anchor="middle" fill="#005587" font-size="9" font-style="italic">central displacement</text>
  <rect x="496" y="395" width="128" height="55" fill="#FFD100" fill-opacity="0.2" stroke="#FFD100" stroke-width="1" rx="3"/>
  <text x="560" y="410" text-anchor="middle" fill="#005587" font-size="8" font-weight="bold">MRI Signs:</text>
  <text x="560" y="423" text-anchor="middle" fill="#005587" font-size="8">- Double PCL sign</text>
  <text x="560" y="436" text-anchor="middle" fill="#005587" font-size="8">- Absent bow-tie sign</text>
  <text x="560" y="449" text-anchor="middle" fill="#005587" font-size="8">- Fragment in notch</text>

  <!-- Panel 5: Root Tear -->
  <rect x="644" y="60" width="148" height="410" fill="#f8f9fa" stroke="#DAEBFE" stroke-width="1.5" rx="8"/>
  <rect x="654" y="70" width="128" height="28" fill="#2774AE" rx="4"/>
  <text x="718" y="89" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Root Tear</text>

  <!-- Top-down meniscus with root tear -->
  <g transform="translate(718, 190)">
    <path d="M -45,-35 C -55,-20 -55,20 -45,35 C -35,48 -10,50 10,45 C 25,42 40,30 45,15 C 50,0 50,-15 45,-25 C 38,-35 25,-42 10,-45 C -10,-48 -35,-45 -45,-35 Z" fill="#DAEBFE" stroke="#005587" stroke-width="2"/>
    <path d="M -25,-22 C -30,-10 -30,10 -25,22 C -20,30 -5,32 10,28 C 20,25 28,15 30,5 C 32,-5 30,-15 28,-20 C 23,-27 15,-30 5,-30 C -10,-28 -22,-28 -25,-22 Z" fill="white" stroke="#005587" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Root attachment area -->
    <circle cx="10" cy="-42" r="6" fill="#FFD100" fill-opacity="0.5" stroke="#005587" stroke-width="1"/>
    <!-- Root tear -->
    <line x1="5" y1="-38" x2="15" y2="-48" stroke="#cc3333" stroke-width="3" stroke-linecap="round"/>
    <text x="10" y="-52" text-anchor="middle" fill="#cc3333" font-size="8" font-weight="bold">TEAR</text>
  </g>
  <text x="718" y="270" text-anchor="middle" fill="#005587" font-size="9">Tear at meniscal root</text>
  <text x="718" y="284" text-anchor="middle" fill="#005587" font-size="9">attachment to tibia</text>
  <line x1="662" y1="300" x2="774" y2="300" stroke="#DAEBFE" stroke-width="1"/>
  <text x="718" y="320" text-anchor="middle" fill="#005587" font-size="9" font-style="italic">Functionally equivalent</text>
  <text x="718" y="334" text-anchor="middle" fill="#005587" font-size="9" font-style="italic">to total meniscectomy</text>
  <text x="718" y="348" text-anchor="middle" fill="#005587" font-size="9" font-style="italic">(complete loss of hoop</text>
  <text x="718" y="362" text-anchor="middle" fill="#005587" font-size="9" font-style="italic">stress)</text>
  <rect x="654" y="393" width="128" height="64" fill="#FFD100" fill-opacity="0.2" stroke="#FFD100" stroke-width="1" rx="3"/>
  <text x="718" y="406" text-anchor="middle" fill="#005587" font-size="8" font-weight="bold">MRI Signs:</text>
  <text x="718" y="419" text-anchor="middle" fill="#005587" font-size="8">- Ghost sign (sagittal)</text>
  <text x="718" y="432" text-anchor="middle" fill="#005587" font-size="8">- Meniscal extrusion</text>
  <text x="718" y="445" text-anchor="middle" fill="#005587" font-size="8">- Medial post. root tear</text>
  <text x="718" y="455" text-anchor="middle" fill="#005587" font-size="8">most common</text>
</svg>