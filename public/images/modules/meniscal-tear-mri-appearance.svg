<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="mArrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="white"/>
    </marker>
    <marker id="mArrowRed" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#ff6666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" fill="#1a1a2e"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="700" height="44" fill="#2774AE" rx="0"/>
  <text x="350" y="30" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Meniscal Tear: MRI Appearance (Sagittal View)</text>

  <!-- Panel 1: Normal -->
  <rect x="20" y="55" width="205" height="290" fill="#0f0f23" stroke="#444" stroke-width="1" rx="6"/>
  <rect x="35" y="62" width="175" height="24" fill="#2774AE" rx="3"/>
  <text x="122" y="79" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Normal Meniscus</text>

  <!-- Normal meniscus - dark triangle -->
  <g transform="translate(122, 195)">
    <!-- Femoral condyle above -->
    <path d="M -70,-50 C -70,-50 -30,-65 0,-68 C 30,-65 70,-50 70,-50"
          fill="#3a3a4e" stroke="#666" stroke-width="1.5"/>
    <text x="0" y="-55" text-anchor="middle" fill="#777" font-size="9">Femoral condyle</text>

    <!-- Tibial plateau below -->
    <rect x="-75" y="48" width="150" height="30" fill="#3a3a4e" stroke="#666" stroke-width="1.5" rx="2"/>
    <text x="0" y="70" text-anchor="middle" fill="#777" font-size="9">Tibial plateau</text>

    <!-- Normal meniscus (uniformly dark bowtie) -->
    <path d="M -60,45 L -20,-20 L 0,-5 L 20,-20 L 60,45 Z"
          fill="#1a1a2e" stroke="#aaa" stroke-width="2"/>

    <!-- Labels -->
    <text x="-40" y="30" fill="#aaa" font-size="8">AH</text>
    <text x="35" y="30" fill="#aaa" font-size="8">PH</text>
  </g>

  <!-- Normal description -->
  <text x="122" y="290" text-anchor="middle" fill="#4CAF50" font-size="12" font-weight="bold">Normal</text>
  <text x="122" y="306" text-anchor="middle" fill="#aaa" font-size="10">Uniform low signal</text>
  <text x="122" y="320" text-anchor="middle" fill="#aaa" font-size="10">Dark, triangular shape</text>
  <text x="122" y="334" text-anchor="middle" fill="#aaa" font-size="10">No internal signal</text>

  <!-- Panel 2: Grade 2 (intrameniscal signal) -->
  <rect x="247" y="55" width="205" height="290" fill="#0f0f23" stroke="#444" stroke-width="1" rx="6"/>
  <rect x="262" y="62" width="175" height="24" fill="#FFD100" rx="3"/>
  <text x="349" y="79" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="bold">Grade 2 Signal</text>

  <!-- Grade 2 meniscus -->
  <g transform="translate(349, 195)">
    <!-- Femoral condyle above -->
    <path d="M -70,-50 C -70,-50 -30,-65 0,-68 C 30,-65 70,-50 70,-50"
          fill="#3a3a4e" stroke="#666" stroke-width="1.5"/>

    <!-- Tibial plateau below -->
    <rect x="-75" y="48" width="150" height="30" fill="#3a3a4e" stroke="#666" stroke-width="1.5" rx="2"/>

    <!-- Meniscus with internal signal -->
    <path d="M -60,45 L -20,-20 L 0,-5 L 20,-20 L 60,45 Z"
          fill="#1a1a2e" stroke="#aaa" stroke-width="2"/>

    <!-- Linear bright signal NOT reaching surface -->
    <line x1="10" y1="30" x2="35" y2="5" stroke="#FFD100" stroke-width="4" stroke-linecap="round" opacity="0.85"/>

    <!-- Arrow showing signal doesn't reach surface -->
    <line x1="55" y1="5" x2="42" y2="8" stroke="white" stroke-width="1" marker-end="url(#mArrow)"/>
    <text x="60" y="2" fill="white" font-size="8">Does NOT</text>
    <text x="60" y="12" fill="white" font-size="8">reach surface</text>

    <text x="-40" y="30" fill="#aaa" font-size="8">AH</text>
    <text x="35" y="30" fill="#aaa" font-size="8">PH</text>
  </g>

  <!-- Grade 2 description -->
  <text x="349" y="290" text-anchor="middle" fill="#FFD100" font-size="12" font-weight="bold">Intrameniscal Signal</text>
  <text x="349" y="306" text-anchor="middle" fill="#aaa" font-size="10">Linear high signal within</text>
  <text x="349" y="320" text-anchor="middle" fill="#aaa" font-size="10">meniscal substance</text>
  <text x="349" y="336" text-anchor="middle" fill="#FFD100" font-size="10" font-weight="bold">NOT a tear</text>

  <!-- Panel 3: Grade 3 (tear) -->
  <rect x="475" y="55" width="205" height="290" fill="#0f0f23" stroke="#ff6666" stroke-width="1.5" rx="6"/>
  <rect x="490" y="62" width="175" height="24" fill="#cc3333" rx="3"/>
  <text x="577" y="79" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Grade 3 Tear</text>

  <!-- Grade 3 meniscus -->
  <g transform="translate(577, 195)">
    <!-- Femoral condyle above -->
    <path d="M -70,-50 C -70,-50 -30,-65 0,-68 C 30,-65 70,-50 70,-50"
          fill="#3a3a4e" stroke="#666" stroke-width="1.5"/>

    <!-- Tibial plateau below -->
    <rect x="-75" y="48" width="150" height="30" fill="#3a3a4e" stroke="#666" stroke-width="1.5" rx="2"/>

    <!-- Meniscus with tear signal reaching surface -->
    <path d="M -60,45 L -20,-20 L 0,-5 L 20,-20 L 60,45 Z"
          fill="#1a1a2e" stroke="#aaa" stroke-width="2"/>

    <!-- Bright signal reaching articular surface -->
    <line x1="5" y1="35" x2="38" y2="-2" stroke="#ff6666" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <!-- Extension reaching inferior surface -->
    <line x1="5" y1="35" x2="-8" y2="45" stroke="#ff6666" stroke-width="5" stroke-linecap="round" opacity="0.9"/>

    <!-- Arrow showing surface contact -->
    <line x1="-25" y1="52" x2="-12" y2="47" stroke="#ff6666" stroke-width="1.5" marker-end="url(#mArrowRed)"/>
    <text x="-60" y="52" fill="#ff6666" font-size="8" font-weight="bold">Reaches</text>
    <text x="-60" y="62" fill="#ff6666" font-size="8" font-weight="bold">surface!</text>

    <!-- Arrow at femoral surface -->
    <line x1="55" y1="-8" x2="42" y2="-4" stroke="#ff6666" stroke-width="1.5" marker-end="url(#mArrowRed)"/>
    <text x="57" y="-12" fill="#ff6666" font-size="8" font-weight="bold">Surface</text>
    <text x="57" y="-2" fill="#ff6666" font-size="8" font-weight="bold">contact</text>

    <text x="-40" y="30" fill="#aaa" font-size="8">AH</text>
    <text x="35" y="30" fill="#aaa" font-size="8">PH</text>
  </g>

  <!-- Grade 3 description -->
  <text x="577" y="290" text-anchor="middle" fill="#ff6666" font-size="12" font-weight="bold">Tear</text>
  <text x="577" y="306" text-anchor="middle" fill="#aaa" font-size="10">Signal reaches articular</text>
  <text x="577" y="320" text-anchor="middle" fill="#aaa" font-size="10">surface on 2+ images</text>
  <text x="577" y="336" text-anchor="middle" fill="#ff6666" font-size="10" font-weight="bold">TRUE MENISCAL TEAR</text>

  <!-- Bottom key -->
  <rect x="20" y="355" width="660" height="35" fill="#16213e" stroke="#333" stroke-width="1" rx="4"/>
  <text x="40" y="377" fill="white" font-size="11" font-weight="bold">Key:</text>
  <rect x="75" y="366" width="14" height="14" fill="#1a1a2e" stroke="#aaa" stroke-width="1.5"/>
  <text x="95" y="377" fill="#aaa" font-size="10">Normal meniscus (low signal)</text>
  <line x1="280" y1="373" x2="305" y2="373" stroke="#FFD100" stroke-width="4" stroke-linecap="round"/>
  <text x="312" y="377" fill="#FFD100" font-size="10">Intrameniscal signal</text>
  <line x1="460" y1="373" x2="485" y2="373" stroke="#ff6666" stroke-width="5" stroke-linecap="round"/>
  <text x="492" y="377" fill="#ff6666" font-size="10">Surface-reaching signal (tear)</text>
</svg>