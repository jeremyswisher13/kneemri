<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="oLeader" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4 Z" fill="white"/>
    </marker>
    <radialGradient id="cystGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#88ccff" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#88ccff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#88ccff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" fill="#1a1a2e"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="700" height="44" fill="#2774AE" rx="0"/>
  <text x="350" y="30" text-anchor="middle" fill="white" font-size="18" font-weight="bold">OCD Stability Assessment on MRI</text>

  <!-- Panel 1: Stable OCD -->
  <rect x="15" y="55" width="275" height="335" fill="#0f0f23" stroke="#4CAF50" stroke-width="1.5" rx="6"/>
  <rect x="30" y="62" width="245" height="26" fill="#4CAF50" rx="3"/>
  <text x="152" y="81" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Stable OCD</text>

  <!-- Stable OCD - femoral condyle cross section -->
  <g transform="translate(152, 215)">
    <!-- Femoral condyle bone -->
    <path d="M -100,-30 C -100,-30 -90,-80 -60,-100 C -30,-115 30,-115 60,-100 C 90,-80 100,-30 100,-30"
          fill="#3a3a4e" stroke="#666" stroke-width="2"/>

    <!-- Articular cartilage (intact) -->
    <path d="M -100,-30 C -100,-30 -90,-80 -60,-100 C -30,-115 30,-115 60,-100 C 90,-80 100,-30 100,-30"
          fill="none" stroke="#777" stroke-width="5" opacity="0.5"/>

    <!-- OCD fragment in situ -->
    <path d="M -20,-90 C -15,-100 15,-100 20,-90 C 25,-80 25,-70 20,-65 C 15,-60 -15,-60 -20,-65 C -25,-70 -25,-80 -20,-90 Z"
          fill="#4a4a5e" stroke="#888" stroke-width="1.5"/>

    <!-- Interface line (partial, low signal - NOT fluid) -->
    <path d="M -18,-66 C -10,-58 10,-58 18,-66"
          fill="none" stroke="#666" stroke-width="2" stroke-dasharray="4,3"/>

    <!-- No fluid rim -->
    <!-- Intact cartilage cap over fragment -->
    <path d="M -22,-92 C -17,-105 17,-105 22,-92"
          fill="none" stroke="#777" stroke-width="4" opacity="0.7"/>

    <!-- Labels for stable features -->
    <!-- Intact cartilage -->
    <line x1="-8" y1="-104" x2="-55" y2="-112" stroke="white" stroke-width="0.8" marker-end="url(#oLeader)"/>
    <text x="-128" y="-110" text-anchor="start" fill="#4CAF50" font-size="10" font-weight="bold">Intact cartilage cap</text>

    <!-- No fluid rim label -->
    <line x1="28" y1="-72" x2="70" y2="-75" stroke="white" stroke-width="0.8" marker-end="url(#oLeader)"/>
    <text x="75" y="-78" fill="white" font-size="9">No fluid rim</text>
    <text x="75" y="-66" fill="#aaa" font-size="8">(partial/incomplete)</text>

    <!-- Fragment in situ -->
    <line x1="-30" y1="-78" x2="-70" y2="-80" stroke="white" stroke-width="0.8" marker-end="url(#oLeader)"/>
    <text x="-75" y="-82" text-anchor="end" fill="white" font-size="9">Fragment in situ</text>

    <!-- No cysts -->
    <line x1="0" y1="-55" x2="0" y2="-40" stroke="white" stroke-width="0.8"/>
    <text x="0" y="-35" text-anchor="middle" fill="white" font-size="9">No subchondral cysts</text>

    <!-- Bone label -->
    <text x="0" y="15" text-anchor="middle" fill="#777" font-size="11">Femoral condyle</text>
  </g>

  <!-- Stable checklist -->
  <rect x="30" y="310" width="245" height="68" fill="#16213e" stroke="#4CAF50" stroke-width="1" rx="4"/>
  <text x="45" y="328" fill="#4CAF50" font-size="10" font-weight="bold">Stable signs:</text>
  <text x="45" y="343" fill="white" font-size="9">&#x2713; Cartilage cap intact</text>
  <text x="45" y="356" fill="white" font-size="9">&#x2713; No complete fluid rim</text>
  <text x="45" y="369" fill="white" font-size="9">&#x2713; No subchondral cysts</text>
  <text x="175" y="343" fill="white" font-size="9">&#x2713; Fragment in place</text>
  <text x="175" y="356" fill="white" font-size="9">&#x2713; No displacement</text>
  <text x="175" y="369" fill="#4CAF50" font-size="9" font-style="italic">Conservative Rx</text>

  <!-- Panel 2: Unstable OCD -->
  <rect x="310" y="55" width="275" height="335" fill="#0f0f23" stroke="#ff6666" stroke-width="1.5" rx="6"/>
  <rect x="325" y="62" width="245" height="26" fill="#cc3333" rx="3"/>
  <text x="447" y="81" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Unstable OCD</text>

  <!-- Unstable OCD - femoral condyle cross section -->
  <g transform="translate(447, 215)">
    <!-- Femoral condyle bone -->
    <path d="M -100,-30 C -100,-30 -90,-80 -60,-100 C -30,-115 30,-115 60,-100 C 90,-80 100,-30 100,-30"
          fill="#3a3a4e" stroke="#666" stroke-width="2"/>

    <!-- Articular cartilage (with breach) -->
    <path d="M -100,-30 C -100,-30 -90,-80 -60,-100 C -45,-108 -25,-113 -20,-112"
          fill="none" stroke="#777" stroke-width="5" opacity="0.5"/>
    <path d="M 22,-112 C 30,-115 45,-108 60,-100 C 90,-80 100,-30 100,-30"
          fill="none" stroke="#777" stroke-width="5" opacity="0.5"/>

    <!-- Cartilage breach gap -->
    <line x1="-18" y1="-112" x2="20" y2="-112" stroke="#88ccff" stroke-width="3" opacity="0.8"/>

    <!-- OCD fragment - slightly displaced -->
    <path d="M -18,-88 C -13,-98 15,-98 20,-88 C 25,-78 25,-68 20,-63 C 15,-58 -13,-58 -18,-63 C -23,-68 -23,-78 -18,-88 Z"
          fill="#4a4a5e" stroke="#888" stroke-width="1.5" transform="translate(2,-3)"/>

    <!-- Complete fluid rim surrounding fragment -->
    <path d="M -22,-92 C -17,-105 17,-105 22,-92 C 28,-78 28,-65 22,-58 C 17,-52 -17,-52 -22,-58 C -28,-65 -28,-78 -22,-92 Z"
          fill="none" stroke="#88ccff" stroke-width="3" opacity="0.8" transform="translate(2,-3)"/>

    <!-- Subchondral cysts -->
    <ellipse cx="-10" cy="-45" rx="8" ry="6" fill="url(#cystGlow)"/>
    <ellipse cx="15" cy="-42" rx="6" ry="5" fill="url(#cystGlow)"/>

    <!-- Labels for unstable features -->
    <!-- Complete fluid rim -->
    <line x1="30" y1="-78" x2="75" y2="-85" stroke="#88ccff" stroke-width="0.8" marker-end="url(#oLeader)"/>
    <text x="80" y="-88" fill="#88ccff" font-size="9" font-weight="bold">Complete fluid rim</text>
    <text x="80" y="-76" fill="#88ccff" font-size="8">(surrounds fragment)</text>

    <!-- Cartilage breach -->
    <line x1="8" y1="-112" x2="48" y2="-118" stroke="#ff6666" stroke-width="0.8" marker-end="url(#oLeader)"/>
    <text x="53" y="-118" text-anchor="start" fill="#ff6666" font-size="10" font-weight="bold">Cartilage breach</text>

    <!-- Subchondral cysts -->
    <line x1="-15" y1="-38" x2="-70" y2="-35" stroke="#88ccff" stroke-width="0.8" marker-end="url(#oLeader)"/>
    <text x="-75" y="-38" text-anchor="end" fill="#88ccff" font-size="9" font-weight="bold">Subchondral cysts</text>

    <!-- Fragment displacement -->
    <line x1="-28" y1="-78" x2="-70" y2="-78" stroke="white" stroke-width="0.8" marker-end="url(#oLeader)"/>
    <text x="-75" y="-80" text-anchor="end" fill="white" font-size="9">Fragment displaced</text>

    <!-- Bone label -->
    <text x="0" y="15" text-anchor="middle" fill="#777" font-size="11">Femoral condyle</text>
  </g>

  <!-- Unstable checklist -->
  <rect x="325" y="310" width="245" height="68" fill="#16213e" stroke="#cc3333" stroke-width="1" rx="4"/>
  <text x="340" y="328" fill="#ff6666" font-size="10" font-weight="bold">Instability signs:</text>
  <text x="340" y="343" fill="white" font-size="9">&#x2717; Complete fluid rim</text>
  <text x="340" y="356" fill="white" font-size="9">&#x2717; Subchondral cysts</text>
  <text x="340" y="369" fill="white" font-size="9">&#x2717; Cartilage breach</text>
  <text x="475" y="343" fill="white" font-size="9">&#x2717; Fragment displacement</text>
  <text x="475" y="356" fill="white" font-size="9">&#x2717; Empty crater</text>
  <text x="475" y="369" fill="#ff6666" font-size="9" font-style="italic">Surgical intervention</text>

  <!-- Legend at bottom -->
  <rect x="175" y="95" width="250" height="20" fill="#1a1a2e" fill-opacity="0.9" stroke="#444" stroke-width="1" rx="3"/>
  <line x1="190" y1="105" x2="210" y2="105" stroke="#88ccff" stroke-width="3" opacity="0.8"/>
  <text x="218" y="109" fill="#88ccff" font-size="9">= Fluid signal (bright on T2/PD FS)</text>
</svg>