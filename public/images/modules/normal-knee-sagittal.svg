<svg xmlns="http://www.w3.org/2000/svg" viewBox="-100 0 800 500" width="800" height="500" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="sLeader" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4 Z" fill="white"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="-100" y="0" width="800" height="500" fill="#1a1a2e"/>

  <!-- Title bar -->
  <rect x="-100" y="0" width="800" height="44" fill="#2774AE" rx="0"/>
  <text x="300" y="30" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Normal Knee: Sagittal MRI Anatomy</text>

  <!-- Orientation -->
  <text x="30" y="68" fill="#888" font-size="11" font-weight="bold">ANTERIOR</text>
  <text x="505" y="68" fill="#888" font-size="11" font-weight="bold">POSTERIOR</text>

  <!-- Quadriceps tendon -->
  <path d="M 120,80 L 130,130 L 140,160"
        fill="none" stroke="#555" stroke-width="10" stroke-linecap="round"/>
  <path d="M 120,80 L 130,130 L 140,160"
        fill="none" stroke="#4a4a5e" stroke-width="8" stroke-linecap="round"/>

  <!-- PATELLA -->
  <ellipse cx="150" cy="195" rx="28" ry="42" fill="#3a3a4e" stroke="#666" stroke-width="2"/>
  <!-- Patellar cartilage (posterior surface) -->
  <path d="M 165,165 C 170,180 172,200 170,220 C 168,230 165,235 163,225"
        fill="none" stroke="#777" stroke-width="3" opacity="0.7"/>

  <!-- Patellar tendon -->
  <path d="M 155,235 L 165,280 L 170,310"
        fill="none" stroke="#555" stroke-width="8" stroke-linecap="round"/>
  <path d="M 155,235 L 165,280 L 170,310"
        fill="none" stroke="#4a4a5e" stroke-width="6" stroke-linecap="round"/>

  <!-- FEMUR -->
  <path d="M 170,80 C 170,80 160,130 158,180 C 155,220 165,260 200,290
           C 225,310 260,320 300,323 C 340,325 375,322 405,317
           C 440,310 470,295 485,275 C 505,250 510,220 505,180
           C 500,130 490,80 490,80 L 490,75 L 170,75 Z"
        fill="#3a3a4e" stroke="#666" stroke-width="2"/>
  <!-- Femoral marrow -->
  <path d="M 200,100 C 200,100 195,160 200,220 C 205,260 230,290 290,295
           C 350,298 420,280 450,250 C 470,230 475,190 470,130 C 468,110 465,100 465,100"
        fill="#4a4a5e" stroke="none" opacity="0.4"/>
  <!-- Femoral condyle articular cartilage -->
  <path d="M 200,290 C 225,312 260,322 300,325 C 340,327 375,324 405,319 C 440,312 470,297 485,277"
        fill="none" stroke="#777" stroke-width="4" opacity="0.6"/>

  <!-- Hoffa fat pad -->
  <path d="M 175,270 C 180,280 190,300 200,305 C 210,310 220,305 215,290 C 210,275 200,265 190,260 Z"
        fill="#5a5a3e" stroke="#666" stroke-width="1" opacity="0.6"/>

  <!-- Intercondylar notch -->
  <path d="M 300,320 C 305,295 315,285 340,280 C 365,285 375,295 380,320"
        fill="#0f0f23" stroke="#555" stroke-width="1.5"/>

  <!-- TIBIA -->
  <path d="M 180,340 C 180,340 172,345 168,355 L 160,430 L 480,430 L 472,355
           C 468,345 460,340 460,340 Z"
        fill="#3a3a4e" stroke="#666" stroke-width="2"/>
  <!-- Tibial marrow -->
  <path d="M 195,355 L 190,415 L 455,415 L 450,355"
        fill="#4a4a5e" stroke="none" opacity="0.3"/>

  <!-- Tibial plateau surface -->
  <line x1="180" y1="340" x2="460" y2="340" stroke="#666" stroke-width="1.5"/>

  <!-- Tibial eminence -->
  <path d="M 310,340 L 325,328 L 355,328 L 370,340" fill="#3a3a4e" stroke="#666" stroke-width="1.5"/>

  <!-- ACL -->
  <path d="M 420,275 C 400,290 345,305 290,320 C 255,330 225,338 215,340"
        fill="none" stroke="#4a4a6e" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <path d="M 420,275 C 400,290 345,305 290,320 C 255,330 225,338 215,340"
        fill="none" stroke="#555" stroke-width="3" stroke-linecap="round"/>

  <!-- PCL -->
  <path d="M 285,285 C 310,300 365,320 410,335 C 435,342 455,348 465,355"
        fill="none" stroke="#4a4a6e" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <path d="M 285,285 C 310,300 365,320 410,335 C 435,342 455,348 465,355"
        fill="none" stroke="#444" stroke-width="4" stroke-linecap="round"/>

  <!-- Anterior horn meniscus -->
  <path d="M 200,335 L 220,318 L 240,335 Z"
        fill="#1a1a2e" stroke="#888" stroke-width="1.5"/>

  <!-- Posterior horn meniscus -->
  <path d="M 400,335 L 420,310 L 445,335 Z"
        fill="#1a1a2e" stroke="#888" stroke-width="1.5"/>

  <!-- LABELS with leader lines -->

  <!-- Quadriceps tendon label -->
  <line x1="125" y1="100" x2="45" y2="90" stroke="white" stroke-width="0.8" marker-end="url(#sLeader)"/>
  <text x="40" y="86" text-anchor="end" fill="white" font-size="10">Quadriceps tendon</text>

  <!-- Patella label -->
  <line x1="140" y1="195" x2="50" y2="195" stroke="white" stroke-width="0.8" marker-end="url(#sLeader)"/>
  <text x="45" y="199" text-anchor="end" fill="white" font-size="10">Patella</text>

  <!-- Patellar tendon label -->
  <line x1="160" y1="270" x2="55" y2="260" stroke="white" stroke-width="0.8" marker-end="url(#sLeader)"/>
  <text x="50" y="264" text-anchor="end" fill="white" font-size="10">Patellar tendon</text>

  <!-- Hoffa fat pad label -->
  <line x1="195" y1="285" x2="80" y2="310" stroke="white" stroke-width="0.8" marker-end="url(#sLeader)"/>
  <text x="75" y="314" text-anchor="end" fill="white" font-size="10">Hoffa fat pad</text>

  <!-- Femoral condyle label -->
  <line x1="440" y1="260" x2="530" y2="230" stroke="white" stroke-width="0.8" marker-end="url(#sLeader)"/>
  <text x="535" y="234" fill="white" font-size="10">Femoral condyle</text>

  <!-- Articular cartilage label -->
  <line x1="365" y1="316" x2="530" y2="275" stroke="white" stroke-width="0.8" marker-end="url(#sLeader)"/>
  <text x="535" y="270" fill="#aaa" font-size="9">Articular cartilage</text>
  <text x="535" y="282" fill="#aaa" font-size="9">(gray line)</text>

  <!-- ACL label -->
  <line x1="315" y1="308" x2="530" y2="305" stroke="#2774AE" stroke-width="0.8"/>
  <text x="535" y="302" fill="#2774AE" font-size="11" font-weight="bold">ACL</text>
  <text x="535" y="314" fill="#aaa" font-size="9">(dark band)</text>

  <!-- PCL label -->
  <line x1="400" y1="335" x2="530" y2="340" stroke="#2774AE" stroke-width="0.8"/>
  <text x="535" y="337" fill="#2774AE" font-size="11" font-weight="bold">PCL</text>
  <text x="535" y="349" fill="#aaa" font-size="9">(smooth arc)</text>

  <!-- Anterior horn label -->
  <line x1="220" y1="325" x2="110" y2="370" stroke="white" stroke-width="0.8" marker-end="url(#sLeader)"/>
  <text x="25" y="368" fill="white" font-size="10">Anterior horn</text>
  <text x="25" y="380" fill="#aaa" font-size="9">(meniscus)</text>

  <!-- Posterior horn label -->
  <line x1="425" y1="318" x2="530" y2="370" stroke="white" stroke-width="0.8" marker-end="url(#sLeader)"/>
  <text x="535" y="368" fill="white" font-size="10">Posterior horn</text>
  <text x="535" y="380" fill="#aaa" font-size="9">(meniscus)</text>

  <!-- Tibial plateau label -->
  <line x1="280" y1="340" x2="530" y2="400" stroke="white" stroke-width="0.8" marker-end="url(#sLeader)"/>
  <text x="535" y="404" fill="white" font-size="10">Tibial plateau</text>

  <!-- Femur label -->
  <text x="330" y="150" text-anchor="middle" fill="#777" font-size="14" font-weight="bold">FEMUR</text>

  <!-- Tibia label -->
  <text x="320" y="410" text-anchor="middle" fill="#777" font-size="14" font-weight="bold">TIBIA</text>

  <!-- Bottom info -->
  <rect x="15" y="445" width="670" height="42" fill="#16213e" stroke="#333" stroke-width="1" rx="4"/>
  <text x="30" y="463" fill="white" font-size="10" font-weight="bold">Sagittal PD FS:</text>
  <text x="130" y="463" fill="#aaa" font-size="10">Best sequence for ACL, menisci, cartilage, and bone marrow edema</text>
  <text x="30" y="479" fill="white" font-size="10" font-weight="bold">Key structures:</text>
  <text x="130" y="479" fill="#aaa" font-size="10">Cruciates, meniscal horns, extensor mechanism, Hoffa fat pad</text>
</svg>