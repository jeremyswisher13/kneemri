<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" font-family="'Helvetica Neue', Arial, sans-serif">

  <!-- Background -->
  <rect width="500" height="500" fill="white"/>

  <!-- Red border card -->
  <rect x="10" y="10" width="480" height="480" fill="white" stroke="#DC2626" stroke-width="4" rx="12"/>

  <!-- Red header bar -->
  <rect x="10" y="10" width="480" height="70" fill="#DC2626" rx="12"/>
  <rect x="10" y="50" width="480" height="30" fill="#DC2626"/>

  <!-- Phone icon -->
  <g transform="translate(170, 22)">
    <!-- Phone body -->
    <rect x="0" y="0" width="22" height="38" fill="white" rx="4"/>
    <rect x="2" y="3" width="18" height="26" fill="#DC2626" rx="1"/>
    <!-- Phone circle -->
    <circle cx="11" cy="33" r="2.5" fill="white" stroke="#DC2626" stroke-width="0.5"/>
    <!-- Ring waves -->
    <path d="M 26,8 C 30,5 30,15 26,12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <path d="M 32,4 C 38,-1 38,19 32,14" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Header text -->
  <text x="250" y="45" text-anchor="middle" fill="white" font-size="22" font-weight="bold">CALL THE SURGEON</text>
  <text x="250" y="68" text-anchor="middle" fill="#FFD100" font-size="12" font-weight="bold">Urgent / Direct Communication Required</text>

  <!-- Subtitle bar -->
  <rect x="30" y="90" width="440" height="24" fill="#DAEBFE" rx="4"/>
  <text x="250" y="106" text-anchor="middle" fill="#005587" font-size="12" font-weight="bold">Critical Findings Requiring Immediate Notification</text>

  <!-- Checklist items -->

  <!-- Item 1 -->
  <g transform="translate(30, 130)">
    <!-- Red checkmark circle -->
    <circle cx="16" cy="16" r="14" fill="#DC2626"/>
    <path d="M 8,16 L 14,22 L 24,10" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Text -->
    <text x="40" y="14" fill="#005587" font-size="15" font-weight="bold">Locked Knee (Bucket-Handle Tear)</text>
    <text x="40" y="30" fill="#666" font-size="11">Displaced meniscal fragment causing mechanical block</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="172" x2="460" y2="172" stroke="#eee" stroke-width="1"/>

  <!-- Item 2 -->
  <g transform="translate(30, 185)">
    <circle cx="16" cy="16" r="14" fill="#DC2626"/>
    <path d="M 8,16 L 14,22 L 24,10" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="14" fill="#005587" font-size="15" font-weight="bold">Acute Unstable OCD in Young Athlete</text>
    <text x="40" y="30" fill="#666" font-size="11">Fragment at risk of detachment; may need fixation</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="227" x2="460" y2="227" stroke="#eee" stroke-width="1"/>

  <!-- Item 3 -->
  <g transform="translate(30, 240)">
    <circle cx="16" cy="16" r="14" fill="#DC2626"/>
    <path d="M 8,16 L 14,22 L 24,10" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="14" fill="#005587" font-size="15" font-weight="bold">Septic Arthritis Findings</text>
    <text x="40" y="30" fill="#666" font-size="11">Effusion + synovial enhancement + marrow edema</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="282" x2="460" y2="282" stroke="#eee" stroke-width="1"/>

  <!-- Item 4 -->
  <g transform="translate(30, 295)">
    <circle cx="16" cy="16" r="14" fill="#DC2626"/>
    <path d="M 8,16 L 14,22 L 24,10" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="14" fill="#005587" font-size="15" font-weight="bold">Occult Fracture (Weight-Bearing)</text>
    <text x="40" y="30" fill="#666" font-size="11">Fracture line in tibial plateau or femoral condyle</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="337" x2="460" y2="337" stroke="#eee" stroke-width="1"/>

  <!-- Item 5 -->
  <g transform="translate(30, 350)">
    <circle cx="16" cy="16" r="14" fill="#DC2626"/>
    <path d="M 8,16 L 14,22 L 24,10" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="14" fill="#005587" font-size="15" font-weight="bold">Tumor / Aggressive Lesion</text>
    <text x="40" y="30" fill="#666" font-size="11">Periosteal reaction, soft tissue mass, marrow replacement</text>
  </g>

  <!-- Bottom box with ACR guidance -->
  <rect x="30" y="405" width="440" height="75" fill="#fff3cd" stroke="#FFD100" stroke-width="2" rx="6"/>
  <!-- Warning icon -->
  <g transform="translate(45, 420)">
    <polygon points="12,0 24,22 0,22" fill="#FFD100" stroke="#996600" stroke-width="1"/>
    <text x="12" y="18" text-anchor="middle" fill="#996600" font-size="14" font-weight="bold">!</text>
  </g>
  <text x="80" y="432" fill="#996600" font-size="12" font-weight="bold">ACR Practice Parameter</text>
  <text x="80" y="448" fill="#666" font-size="11">Non-routine communications require direct contact with</text>
  <text x="80" y="462" fill="#666" font-size="11">the referring physician. Document time, method, and the</text>
  <text x="80" y="476" fill="#666" font-size="11">person notified in your report.</text>
</svg>