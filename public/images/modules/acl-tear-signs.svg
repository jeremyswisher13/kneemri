<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrowWhite" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="white"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#FFD100"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#88ccff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" fill="#1a1a2e"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="600" height="44" fill="#2774AE" rx="0"/>
  <text x="300" y="30" text-anchor="middle" fill="white" font-size="18" font-weight="bold">ACL Tear: Primary &amp; Secondary Signs</text>

  <!-- Main sagittal view area -->
  <rect x="15" y="55" width="370" height="390" fill="#0f0f23" stroke="#333" stroke-width="1" rx="6"/>

  <!-- Orientation labels -->
  <text x="35" y="75" fill="#888" font-size="10" font-weight="bold">A</text>
  <text x="360" y="75" fill="#888" font-size="10" font-weight="bold">P</text>

  <!-- FEMUR -->
  <path d="M 80,100 C 80,100 65,150 60,200 C 55,245 65,280 100,310
           C 125,330 160,340 200,343 C 240,345 275,342 305,337
           C 340,330 370,315 385,295 C 400,270 405,240 400,200
           C 395,155 385,110 380,100 L 380,95 L 80,95 Z"
        fill="#3a3a4e" stroke="#666" stroke-width="2"/>
  <!-- Femoral cortex highlight -->
  <path d="M 100,310 C 125,330 160,340 200,343 C 240,345 275,342 305,337 C 340,330 370,315 385,295"
        fill="none" stroke="#888" stroke-width="1.5"/>
  <text x="230" y="170" text-anchor="middle" fill="#999" font-size="13" font-weight="bold">FEMUR</text>

  <!-- Intercondylar notch -->
  <path d="M 200,340 C 205,315 220,305 245,300 C 270,305 285,315 290,340"
        fill="#0f0f23" stroke="#666" stroke-width="1.5"/>

  <!-- TIBIA -->
  <path d="M 90,365 C 90,365 82,370 78,380 L 72,430 L 370,430 L 364,380
           C 360,370 352,365 352,365 Z"
        fill="#3a3a4e" stroke="#666" stroke-width="2"/>
  <text x="220" y="420" text-anchor="middle" fill="#999" font-size="13" font-weight="bold">TIBIA</text>

  <!-- Tibial plateau -->
  <line x1="90" y1="365" x2="352" y2="365" stroke="#888" stroke-width="1.5"/>

  <!-- Normal ACL course (ghost/dashed) -->
  <path d="M 310,300 C 290,315 250,330 210,345 C 180,355 155,362 140,365"
        fill="none" stroke="#555" stroke-width="6" stroke-dasharray="8,6" stroke-linecap="round" opacity="0.5"/>
  <text x="195" y="298" fill="#666" font-size="9" font-style="italic">Normal ACL course</text>

  <!-- Torn ACL (wavy disrupted fibers) -->
  <path d="M 310,300 C 300,308 290,310 280,318 C 275,325 285,328 278,335
           C 270,340 260,338 255,345 C 248,352 258,355 250,358"
        fill="none" stroke="#ff6666" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
  <!-- Disruption gap -->
  <path d="M 250,358 C 240,360 230,356 225,362 C 218,365 210,362 200,368"
        fill="none" stroke="#ff6666" stroke-width="5" stroke-linecap="round" opacity="0.6"/>

  <!-- Empty notch sign label -->
  <line x1="245" y1="310" x2="245" y2="270" stroke="white" stroke-width="1" marker-end="url(#arrowWhite)"/>
  <rect x="195" y="253" width="100" height="18" fill="#1a1a2e" fill-opacity="0.8" rx="2"/>
  <text x="245" y="266" text-anchor="middle" fill="#FFD100" font-size="11" font-weight="bold">Empty notch sign</text>

  <!-- PCL with buckling -->
  <path d="M 195,310 C 215,325 260,345 295,358 C 315,365 330,370 340,378"
        fill="none" stroke="#888" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <!-- PCL buckling curve -->
  <path d="M 260,340 C 268,355 275,360 270,348"
        fill="none" stroke="#88ccff" stroke-width="2" opacity="0.8"/>

  <!-- PCL buckling label -->
  <line x1="280" y1="360" x2="320" y2="440" stroke="#88ccff" stroke-width="1"/>
  <text x="310" y="452" fill="#88ccff" font-size="10" font-weight="bold">PCL buckling</text>

  <!-- Anterior tibial translation arrow -->
  <line x1="100" y1="365" x2="60" y2="365" stroke="#FFD100" stroke-width="2.5" marker-end="url(#arrowYellow)"/>
  <text x="50" y="355" fill="#FFD100" font-size="9" font-weight="bold">&gt;5 mm</text>

  <!-- Anterior tibial subluxation label -->
  <rect x="20" y="375" width="130" height="30" fill="#1a1a2e" fill-opacity="0.9" stroke="#FFD100" stroke-width="1" rx="3"/>
  <text x="85" y="388" text-anchor="middle" fill="#FFD100" font-size="9" font-weight="bold">Anterior tibial</text>
  <text x="85" y="400" text-anchor="middle" fill="#FFD100" font-size="9" font-weight="bold">translation</text>

  <!-- Torn ACL label -->
  <line x1="290" y1="322" x2="335" y2="305" stroke="#ff6666" stroke-width="1"/>
  <text x="338" y="308" fill="#ff6666" font-size="10" font-weight="bold">Torn ACL</text>

  <!-- Side panel: Primary vs Secondary signs -->
  <rect x="395" y="55" width="195" height="390" fill="#16213e" stroke="#333" stroke-width="1" rx="6"/>

  <!-- Primary signs -->
  <rect x="405" y="65" width="175" height="24" fill="#2774AE" rx="3"/>
  <text x="492" y="82" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Primary Signs</text>

  <circle cx="415" cy="104" r="3" fill="#ff6666"/>
  <text x="425" y="108" fill="white" font-size="10">Fiber discontinuity</text>

  <circle cx="415" cy="124" r="3" fill="#ff6666"/>
  <text x="425" y="128" fill="white" font-size="10">Abnormal morphology</text>
  <text x="425" y="140" fill="#aaa" font-size="9">(wavy, lax fibers)</text>

  <circle cx="415" cy="156" r="3" fill="#ff6666"/>
  <text x="425" y="160" fill="white" font-size="10">Abnormal signal</text>
  <text x="425" y="172" fill="#aaa" font-size="9">(edema/hemorrhage)</text>

  <circle cx="415" cy="188" r="3" fill="#ff6666"/>
  <text x="425" y="192" fill="white" font-size="10">Empty notch sign</text>

  <!-- Divider -->
  <line x1="410" y1="210" x2="585" y2="210" stroke="#444" stroke-width="1"/>

  <!-- Secondary signs -->
  <rect x="405" y="220" width="175" height="24" fill="#005587" rx="3"/>
  <text x="492" y="237" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Secondary Signs</text>

  <circle cx="415" cy="259" r="3" fill="#FFD100"/>
  <text x="425" y="263" fill="white" font-size="10">Pivot-shift contusions</text>
  <text x="425" y="275" fill="#aaa" font-size="9">(lat. fem. condyle + PL tibia)</text>

  <circle cx="415" cy="293" r="3" fill="#FFD100"/>
  <text x="425" y="297" fill="white" font-size="10">Anterior tibial translation</text>
  <text x="425" y="309" fill="#aaa" font-size="9">(&gt;5 mm subluxation)</text>

  <circle cx="415" cy="327" r="3" fill="#FFD100"/>
  <text x="425" y="331" fill="white" font-size="10">Deepened lateral sulcus</text>
  <text x="425" y="343" fill="#aaa" font-size="9">(&gt;1.5 mm depth)</text>

  <circle cx="415" cy="361" r="3" fill="#FFD100"/>
  <text x="425" y="365" fill="white" font-size="10">Segond fracture</text>
  <text x="425" y="377" fill="#aaa" font-size="9">(lateral tibial avulsion)</text>

  <circle cx="415" cy="395" r="3" fill="#FFD100"/>
  <text x="425" y="399" fill="white" font-size="10">PCL buckling</text>

  <circle cx="415" cy="419" r="3" fill="#FFD100"/>
  <text x="425" y="423" fill="white" font-size="10">Uncovered post. horn</text>

  <!-- Bottom key -->
  <rect x="15" y="455" width="570" height="35" fill="#16213e" stroke="#333" stroke-width="1" rx="4"/>
  <line x1="40" y1="472" x2="65" y2="472" stroke="#555" stroke-width="4" stroke-dasharray="6,4"/>
  <text x="72" y="476" fill="#888" font-size="10">Normal ACL</text>
  <line x1="170" y1="472" x2="195" y2="472" stroke="#ff6666" stroke-width="5"/>
  <text x="202" y="476" fill="#ff6666" font-size="10">Torn ACL</text>
  <line x1="290" y1="472" x2="315" y2="472" stroke="#FFD100" stroke-width="2.5"/>
  <text x="322" y="476" fill="#FFD100" font-size="10">Subluxation</text>
  <line x1="410" y1="472" x2="435" y2="472" stroke="#88ccff" stroke-width="2"/>
  <text x="442" y="476" fill="#88ccff" font-size="10">PCL buckling</text>
</svg>