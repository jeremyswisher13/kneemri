<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#DC2626"/>
    </marker>
    <marker id="arrowWhite" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="white"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="500" height="400" fill="white"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="40" fill="#005587"/>
  <text x="250" y="27" text-anchor="middle" fill="white" font-size="17" font-weight="bold">Segond Fracture (Coronal View)</text>

  <!-- Main image area -->
  <rect x="15" y="50" width="470" height="290" fill="#0f0f23" stroke="#2774AE" stroke-width="1.5" rx="6"/>

  <!-- Orientation labels -->
  <text x="30" y="70" fill="#888" font-size="10" font-weight="bold">M</text>
  <text x="465" y="70" fill="#888" font-size="10" font-weight="bold">L</text>

  <!-- FEMUR -->
  <path d="M 100,90 L 100,140 C 100,160 110,185 140,200 C 155,208 175,215 200,218 C 225,220 240,218 250,215
           C 260,218 275,220 300,218 C 325,215 345,208 360,200 C 390,185 400,160 400,140 L 400,90 Z"
        fill="#3a3a4e" stroke="#888" stroke-width="2"/>
  <text x="250" y="155" text-anchor="middle" fill="#999" font-size="13" font-weight="bold">FEMUR</text>

  <!-- Medial femoral condyle -->
  <path d="M 120,190 C 130,210 155,225 200,228 C 220,229 235,227 245,222"
        fill="none" stroke="#aaa" stroke-width="1.5"/>

  <!-- Lateral femoral condyle -->
  <path d="M 255,222 C 265,227 280,229 300,228 C 345,225 370,210 380,190"
        fill="none" stroke="#aaa" stroke-width="1.5"/>

  <!-- Intercondylar notch -->
  <path d="M 245,222 C 247,208 250,200 250,198 C 250,200 253,208 255,222"
        fill="#0f0f23" stroke="#888" stroke-width="1"/>

  <!-- ACL (torn - wavy disrupted line) -->
  <path d="M 248,200 C 244,208 242,215 238,218 C 234,222 240,226 236,230 C 232,234 228,232 226,236"
        fill="none" stroke="#ff6666" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <!-- ACL label -->
  <text x="208" y="215" fill="#ff6666" font-size="10" font-weight="bold">Torn</text>
  <text x="208" y="226" fill="#ff6666" font-size="10" font-weight="bold">ACL</text>

  <!-- TIBIA -->
  <path d="M 100,255 C 100,248 115,242 140,238 C 165,235 200,233 250,233
           C 300,233 335,235 360,238 C 385,242 400,248 400,255 L 400,330 L 100,330 Z"
        fill="#3a3a4e" stroke="#888" stroke-width="2"/>
  <text x="250" y="300" text-anchor="middle" fill="#999" font-size="13" font-weight="bold">TIBIA</text>

  <!-- Tibial plateau surface -->
  <path d="M 120,248 C 155,238 200,234 250,234 C 300,234 345,238 380,248"
        fill="none" stroke="#aaa" stroke-width="2"/>

  <!-- Lateral tibial plateau highlight -->
  <path d="M 310,238 C 335,240 360,244 380,250"
        fill="none" stroke="#ccc" stroke-width="1"/>

  <!-- Lateral capsular ligament (intact proximal, avulsed distally) -->
  <path d="M 395,190 L 395,230"
        fill="none" stroke="#88ccff" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 395,230 L 398,240 L 393,242"
        fill="none" stroke="#88ccff" stroke-width="2" stroke-linecap="round" stroke-dasharray="3,2"/>
  <text x="420" y="215" fill="#88ccff" font-size="9">Lateral</text>
  <text x="420" y="226" fill="#88ccff" font-size="9">capsular</text>
  <text x="420" y="237" fill="#88ccff" font-size="9">ligament</text>

  <!-- Segond fracture fragment -->
  <ellipse cx="405" cy="248" rx="8" ry="4" fill="#FFD100" stroke="#DC2626" stroke-width="2" transform="rotate(-15, 405, 248)"/>

  <!-- Gap between fragment and tibia -->
  <line x1="393" y1="244" x2="396" y2="248" stroke="#0f0f23" stroke-width="3"/>

  <!-- Red arrow pointing to Segond fragment -->
  <line x1="440" y1="270" x2="414" y2="253" stroke="#DC2626" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Segond fracture label -->
  <rect x="415" y="265" width="70" height="30" fill="#DC2626" rx="4" opacity="0.9"/>
  <text x="450" y="278" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Segond</text>
  <text x="450" y="290" text-anchor="middle" fill="white" font-size="10" font-weight="bold">fracture</text>

  <!-- Menisci -->
  <!-- Medial meniscus -->
  <path d="M 130,240 C 140,235 170,233 200,234" fill="none" stroke="#aaa" stroke-width="3" stroke-linecap="round"/>
  <text x="155" y="256" fill="#888" font-size="8">MM</text>

  <!-- Lateral meniscus -->
  <path d="M 300,234 C 330,233 360,235 370,240" fill="none" stroke="#aaa" stroke-width="3" stroke-linecap="round"/>
  <text x="340" y="256" fill="#888" font-size="8">LM</text>

  <!-- Joint effusion suggestion -->
  <path d="M 160,222 C 180,226 220,228 250,228 C 280,228 320,226 340,222"
        fill="#336" stroke="none" opacity="0.3"/>

  <!-- Pathognomonic text box -->
  <rect x="25" y="350" width="450" height="38" fill="#DAEBFE" stroke="#2774AE" stroke-width="1.5" rx="6"/>
  <text x="250" y="366" text-anchor="middle" fill="#005587" font-size="13" font-weight="bold">Pathognomonic for ACL tear</text>
  <text x="250" y="381" text-anchor="middle" fill="#005587" font-size="11">Lateral capsular avulsion at the tibial plateau margin</text>
</svg>