<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400" width="750" height="400" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="meniscusFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <rect x="0" y="0" width="750" height="50" fill="#005587" rx="4"/>
  <text x="375" y="33" text-anchor="middle" fill="white" font-size="20" font-weight="bold">Meniscal Signal Grading (PD / Intermediate-Weighted)</text>

  <!-- Background panels -->
  <rect x="20" y="65" width="220" height="320" fill="#f8f9fa" stroke="#DAEBFE" stroke-width="1.5" rx="8"/>
  <rect x="265" y="65" width="220" height="320" fill="#f8f9fa" stroke="#DAEBFE" stroke-width="1.5" rx="8"/>
  <rect x="510" y="65" width="220" height="320" fill="#fff3f3" stroke="#ffcccc" stroke-width="1.5" rx="8"/>

  <!-- Grade headers -->
  <rect x="40" y="75" width="180" height="30" fill="#2774AE" rx="4"/>
  <text x="130" y="96" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Grade 1</text>

  <rect x="285" y="75" width="180" height="30" fill="#2774AE" rx="4"/>
  <text x="375" y="96" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Grade 2</text>

  <rect x="530" y="75" width="180" height="30" fill="#cc3333" rx="4"/>
  <text x="620" y="96" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Grade 3 (Tear)</text>

  <!-- GRADE 1: Meniscus cross-section with dot -->
  <g transform="translate(130, 200)">
    <!-- Meniscus triangle (dark, like MRI) -->
    <path d="M -80,50 L 0,-60 L 80,50 Z" fill="#1a1a2e" stroke="#005587" stroke-width="2"/>
    <!-- Intra-substance dot signal -->
    <circle cx="0" cy="10" r="8" fill="#FFD100" opacity="0.85"/>
    <!-- Surface lines -->
    <line x1="-80" y1="50" x2="80" y2="50" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="0" y="68" text-anchor="middle" fill="#888" font-size="9">Tibial surface</text>
    <line x1="-40" y1="-5" x2="40" y2="-5" stroke="#888" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="55" y="-2" fill="#888" font-size="8">Femoral</text>
  </g>

  <!-- Grade 1 description -->
  <text x="130" y="290" text-anchor="middle" fill="#005587" font-size="12" font-weight="bold">Globular/Punctate</text>
  <text x="130" y="306" text-anchor="middle" fill="#005587" font-size="11">Intra-substance signal</text>
  <text x="130" y="322" text-anchor="middle" fill="#005587" font-size="11">Does NOT reach surface</text>
  <line x1="50" y1="335" x2="210" y2="335" stroke="#DAEBFE" stroke-width="1"/>
  <text x="130" y="352" text-anchor="middle" fill="#2774AE" font-size="10" font-style="italic">Mucinous degeneration</text>
  <text x="130" y="366" text-anchor="middle" fill="#2774AE" font-size="10" font-style="italic">Normal variant / aging</text>

  <!-- GRADE 2: Meniscus cross-section with linear signal -->
  <g transform="translate(375, 200)">
    <path d="M -80,50 L 0,-60 L 80,50 Z" fill="#1a1a2e" stroke="#005587" stroke-width="2"/>
    <!-- Linear intra-substance signal -->
    <line x1="-30" y1="25" x2="30" y2="-15" stroke="#FFD100" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
    <!-- Surface lines -->
    <line x1="-80" y1="50" x2="80" y2="50" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="0" y="68" text-anchor="middle" fill="#888" font-size="9">Tibial surface</text>
    <line x1="-40" y1="-5" x2="40" y2="-5" stroke="#888" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="55" y="-2" fill="#888" font-size="8">Femoral</text>
  </g>

  <!-- Grade 2 description -->
  <text x="375" y="290" text-anchor="middle" fill="#005587" font-size="12" font-weight="bold">Linear Signal</text>
  <text x="375" y="306" text-anchor="middle" fill="#005587" font-size="11">Intra-substance, linear</text>
  <text x="375" y="322" text-anchor="middle" fill="#005587" font-size="11">Does NOT reach surface</text>
  <line x1="295" y1="335" x2="455" y2="335" stroke="#DAEBFE" stroke-width="1"/>
  <text x="375" y="352" text-anchor="middle" fill="#2774AE" font-size="10" font-style="italic">More advanced degeneration</text>
  <text x="375" y="366" text-anchor="middle" fill="#2774AE" font-size="10" font-style="italic">Not a surgical tear</text>

  <!-- GRADE 3: Meniscus cross-section with signal reaching surface -->
  <g transform="translate(620, 200)">
    <path d="M -80,50 L 0,-60 L 80,50 Z" fill="#1a1a2e" stroke="#005587" stroke-width="2"/>
    <!-- Signal reaching articular surface -->
    <line x1="-10" y1="30" x2="40" y2="-5" stroke="#ff4444" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <!-- Extension to inferior surface -->
    <line x1="-10" y1="30" x2="-25" y2="50" stroke="#ff4444" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <!-- Arrow showing surface contact -->
    <path d="M -42,55 L -25,50 L -30,65" fill="none" stroke="#ff4444" stroke-width="1.5"/>
    <text x="-55" y="62" fill="#ff4444" font-size="8" font-weight="bold">Reaches</text>
    <text x="-55" y="72" fill="#ff4444" font-size="8" font-weight="bold">surface!</text>
    <!-- Surface lines -->
    <line x1="-80" y1="50" x2="80" y2="50" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="30" y="70" text-anchor="middle" fill="#888" font-size="9">Tibial surface</text>
    <line x1="-40" y1="-5" x2="40" y2="-5" stroke="#888" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="55" y="-2" fill="#888" font-size="8">Femoral</text>
  </g>

  <!-- Grade 3 description -->
  <text x="620" y="290" text-anchor="middle" fill="#cc3333" font-size="12" font-weight="bold">Signal Reaches Surface</text>
  <text x="620" y="306" text-anchor="middle" fill="#cc3333" font-size="11">Extends to articular surface</text>
  <text x="620" y="322" text-anchor="middle" fill="#cc3333" font-size="11">on 2+ images / 2+ planes</text>
  <line x1="540" y1="335" x2="700" y2="335" stroke="#ffcccc" stroke-width="1"/>
  <text x="620" y="352" text-anchor="middle" fill="#cc3333" font-size="10" font-weight="bold" font-style="italic">TRUE MENISCAL TEAR</text>
  <text x="620" y="366" text-anchor="middle" fill="#cc3333" font-size="10" font-style="italic">Surgical significance</text>

  <!-- Signal key -->
  <circle cx="48" y="125" cy="125" r="5" fill="#FFD100"/>
  <text x="60" y="129" fill="#005587" font-size="10">= Intra-substance signal (PD/intermediate)</text>
  <line x1="540" y1="120" x2="560" y2="130" stroke="#ff4444" stroke-width="3" stroke-linecap="round"/>
  <text x="567" y="129" fill="#cc3333" font-size="10">= Surface-reaching signal</text>
</svg>