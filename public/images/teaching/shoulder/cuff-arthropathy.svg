<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 440" width="660" height="440" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="cW" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#fff"/></marker>
    <marker id="cY" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#FFD100"/></marker>
  </defs>
  <rect width="660" height="440" fill="#1a1a2e"/>
  <rect width="660" height="44" fill="#2774AE"/>
  <text x="330" y="29" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">Massive Cuff Tear &amp; Cuff Tear Arthropathy</text>
  <text x="330" y="62" text-anchor="middle" fill="#9fb6cc" font-size="12">Oblique coronal — the end-stage pattern. Comment on reparability, not just "tear."</text>

  <rect x="120" y="78" width="420" height="300" fill="#0f0f23" stroke="#333" rx="6"/>

  <!-- acromion (top fixed bar) -->
  <rect x="150" y="120" width="360" height="20" rx="4" fill="#5a6079"/>
  <text x="330" y="113" text-anchor="middle" fill="#7f8aa3" font-size="10">acromion</text>

  <!-- humeral head migrated SUPERIORLY (close to acromion) -->
  <path d="M210,360 Q330,170 450,360 Z" fill="#3a3f55"/>
  <text x="330" y="300" text-anchor="middle" fill="#8b93ac" font-size="10">humeral head (migrated up)</text>

  <!-- glenoid -->
  <rect x="170" y="220" width="16" height="120" rx="4" fill="#4a4f68"/>
  <text x="178" y="352" text-anchor="middle" fill="#7f8aa3" font-size="9">glenoid</text>

  <!-- massively retracted cuff stump near glenoid -->
  <path d="M190,232 Q230,224 262,242 L262,262 Q230,244 190,252 Z" fill="#8a8fa6"/>
  <line x1="150" y1="200" x2="220" y2="240" stroke="#FFD100" stroke-width="2" marker-end="url(#cY)"/>
  <text x="150" y="192" text-anchor="middle" fill="#FFD100" font-size="11">Retracted to glenoid</text>

  <!-- narrowed acromiohumeral interval -->
  <line x1="330" y1="142" x2="330" y2="172" stroke="#ff6b6b" stroke-width="2" marker-start="url(#cW)" marker-end="url(#cW)"/>
  <text x="345" y="160" fill="#ff9b9b" font-size="11" font-weight="bold">AHI &lt; 7 mm</text>
  <text x="345" y="174" fill="#ff9b9b" font-size="9">superior migration</text>

  <!-- bare exposed footprint -->
  <rect x="408" y="250" width="34" height="20" rx="3" fill="#4a4f68"/>
  <text x="425" y="288" text-anchor="middle" fill="#7f8aa3" font-size="9">bare footprint</text>

  <text x="330" y="402" text-anchor="middle" fill="#cfe3f5" font-size="11">Massive retracted tear + atrophy + superior migration → shifts away from simple repair</text>
  <text x="330" y="424" text-anchor="middle" fill="#5b6680" font-size="10">UCLA Shoulder MRI Course — original teaching illustration (schematic)</text>
</svg>
