<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 440" width="660" height="440" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="sW" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#fff"/></marker>
    <marker id="sG" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#7CFC9A"/></marker>
  </defs>
  <rect width="660" height="440" fill="#1a1a2e"/>
  <rect width="660" height="44" fill="#2774AE"/>
  <text x="330" y="29" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">Superior Labrum: SLAP Tear vs Normal Sublabral Recess</text>
  <text x="330" y="62" text-anchor="middle" fill="#9fb6cc" font-size="12">Coronal oblique at the biceps anchor — the most over-called region on shoulder MRI</text>

  <!-- LEFT: normal sublabral recess -->
  <rect x="20" y="78" width="300" height="300" fill="#0f0f23" stroke="#333" rx="6"/>
  <text x="170" y="98" text-anchor="middle" fill="#7CFC9A" font-size="13" font-weight="bold">NORMAL — sublabral recess</text>
  <!-- glenoid -->
  <rect x="150" y="200" width="20" height="150" rx="5" fill="#4a4f68"/>
  <text x="160" y="368" text-anchor="middle" fill="#7f8aa3" font-size="9">glenoid</text>
  <!-- superior labrum triangle -->
  <path d="M170,205 l34,-14 l0,30 Z" fill="#6f76d6"/>
  <!-- biceps anchor -->
  <ellipse cx="216" cy="178" rx="12" ry="9" fill="#8a8fa6"/>
  <text x="244" y="172" fill="#9fb6cc" font-size="9">biceps anchor</text>
  <!-- smooth medial cleft, parallels glenoid, stops at anchor -->
  <path d="M172,206 l20,-8" stroke="#cfe3f5" stroke-width="3" fill="none"/>
  <line x1="120" y1="250" x2="176" y2="212" stroke="#7CFC9A" stroke-width="2" marker-end="url(#sG)"/>
  <rect x="44" y="276" width="150" height="26" rx="13" fill="#13351f" stroke="#7CFC9A" stroke-width="1.5"/>
  <text x="119" y="293" text-anchor="middle" fill="#7CFC9A" font-size="12" font-weight="bold">✓ STOPS at the anchor</text>
  <text x="170" y="404" text-anchor="middle" fill="#cfe3f5" font-size="10">Smooth, medial, parallels glenoid, stops at anchor</text>

  <!-- RIGHT: SLAP tear -->
  <rect x="340" y="78" width="300" height="300" fill="#0f0f23" stroke="#333" rx="6"/>
  <text x="490" y="98" text-anchor="middle" fill="#ff6b6b" font-size="13" font-weight="bold">SLAP TEAR</text>
  <rect x="470" y="200" width="20" height="150" rx="5" fill="#4a4f68"/>
  <text x="480" y="368" text-anchor="middle" fill="#7f8aa3" font-size="9">glenoid</text>
  <path d="M490,205 l34,-14 l0,30 Z" fill="#6f76d6"/>
  <ellipse cx="536" cy="178" rx="12" ry="9" fill="#8a8fa6"/>
  <!-- irregular bright cleft extending LATERALLY into labral substance + posterior to anchor -->
  <path d="M492,206 q24,-2 40,6 q-10,10 -30,6 q-8,-4 -10,-12 Z" fill="#eaf6ff"/>
  <line x1="560" y1="250" x2="522" y2="214" stroke="#fff" stroke-width="2" marker-end="url(#sW)"/>
  <rect x="404" y="276" width="172" height="26" rx="13" fill="#3a1620" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="490" y="293" text-anchor="middle" fill="#ff8f8f" font-size="12" font-weight="bold">✗ Extends PAST the anchor</text>
  <text x="490" y="404" text-anchor="middle" fill="#cfe3f5" font-size="10">Extends laterally / posterior to anchor, irregular margins</text>

  <text x="330" y="424" text-anchor="middle" fill="#5b6680" font-size="10">UCLA Shoulder MRI Course — original teaching illustration (schematic)</text>
</svg>
