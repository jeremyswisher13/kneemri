<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 440" width="660" height="440" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="rW" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#fff"/></marker>
  </defs>
  <rect width="660" height="440" fill="#1a1a2e"/>
  <rect width="660" height="44" fill="#2774AE"/>
  <text x="330" y="29" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">Full-Thickness Tear: Retraction &amp; Muscle Quality</text>
  <text x="330" y="62" text-anchor="middle" fill="#9fb6cc" font-size="12">These two features — not just "tear present" — drive reparability and referral</text>

  <!-- LEFT: coronal retraction landmarks (Patte) -->
  <rect x="20" y="78" width="300" height="300" fill="#0f0f23" stroke="#333" rx="6"/>
  <text x="170" y="98" text-anchor="middle" fill="#FFD100" font-size="13" font-weight="bold">RETRACTION — Patte stage (coronal)</text>
  <!-- humeral head + glenoid -->
  <path d="M150,360 Q235,250 320,360 Z" fill="#3a3f55"/>
  <rect x="280" y="300" width="30" height="20" rx="3" fill="#4a4f68"/>
  <text x="296" y="336" text-anchor="middle" fill="#7f8aa3" font-size="9">footprint</text>
  <!-- glenoid on left -->
  <rect x="60" y="250" width="16" height="90" rx="4" fill="#444a63"/>
  <text x="68" y="360" text-anchor="middle" fill="#7f8aa3" font-size="9">glenoid</text>
  <!-- retracted tendon stump near glenoid -->
  <path d="M80,272 Q120,262 150,280 L150,300 Q120,282 80,292 Z" fill="#8a8fa6"/>
  <!-- stage markers -->
  <circle cx="295" cy="292" r="5" fill="#4caf50"/><text x="295" y="282" text-anchor="middle" fill="#9fe0a0" font-size="10">1</text>
  <circle cx="235" cy="288" r="5" fill="#FFD100"/><text x="235" y="278" text-anchor="middle" fill="#FFD100" font-size="10">2</text>
  <circle cx="150" cy="290" r="5" fill="#ff6b6b"/><text x="150" y="280" text-anchor="middle" fill="#ff9b9b" font-size="10">3</text>
  <text x="170" y="404" text-anchor="middle" fill="#cfe3f5" font-size="10">1 = footprint · 2 = humeral head · 3 = glenoid (worse)</text>

  <!-- RIGHT: sagittal Y muscle view (Goutallier) -->
  <rect x="340" y="78" width="300" height="300" fill="#0f0f23" stroke="#333" rx="6"/>
  <text x="490" y="98" text-anchor="middle" fill="#FFD100" font-size="13" font-weight="bold">MUSCLE — Goutallier (sagittal "Y")</text>
  <!-- scapular Y -->
  <path d="M490,250 L440,150 M490,250 L540,150 M490,250 L490,340" stroke="#555" stroke-width="3" fill="none"/>
  <!-- supraspinatus fossa muscle (good bulk, dark = muscle) -->
  <path d="M450,150 Q490,135 530,150 Q510,185 490,185 Q470,185 450,150 Z" fill="#454b63"/>
  <text x="490" y="128" text-anchor="middle" fill="#9fb6cc" font-size="9">supraspinatus</text>
  <!-- good vs fatty comparison chips -->
  <rect x="380" y="300" width="110" height="58" rx="5" fill="#161a2e" stroke="#2c3350"/>
  <text x="435" y="318" text-anchor="middle" fill="#9fe0a0" font-size="10" font-weight="bold">Grade 0–1</text>
  <rect x="392" y="326" width="86" height="20" rx="3" fill="#454b63"/>
  <text x="435" y="354" text-anchor="middle" fill="#7f8aa3" font-size="9">muscle &gt; fat</text>
  <rect x="500" y="300" width="120" height="58" rx="5" fill="#161a2e" stroke="#2c3350"/>
  <text x="560" y="318" text-anchor="middle" fill="#ff9b9b" font-size="10" font-weight="bold">Grade 3–4</text>
  <rect x="512" y="326" width="96" height="20" rx="3" fill="#454b63"/>
  <line x1="512" y1="330" x2="608" y2="330" stroke="#cdd6e6" stroke-width="2"/>
  <line x1="512" y1="336" x2="608" y2="336" stroke="#cdd6e6" stroke-width="2"/>
  <line x1="512" y1="342" x2="608" y2="342" stroke="#cdd6e6" stroke-width="2"/>
  <text x="560" y="354" text-anchor="middle" fill="#7f8aa3" font-size="9">fat ≥ muscle</text>
  <text x="490" y="222" text-anchor="middle" fill="#cfe3f5" font-size="10">Bright streaks within muscle = fatty infiltration</text>
  <text x="490" y="238" text-anchor="middle" fill="#cfe3f5" font-size="10">Grade ≥3 → poor healing / may be irreparable</text>

  <text x="330" y="424" text-anchor="middle" fill="#5b6680" font-size="10">UCLA Shoulder MRI Course — original teaching illustration (schematic)</text>
</svg>
