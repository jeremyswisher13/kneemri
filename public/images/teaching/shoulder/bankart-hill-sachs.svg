<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 440" width="660" height="440" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="bW" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#fff"/></marker>
    <marker id="bY" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#FFD100"/></marker>
  </defs>
  <rect width="660" height="440" fill="#1a1a2e"/>
  <rect width="660" height="44" fill="#2774AE"/>
  <text x="330" y="29" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">Anterior Instability: Bankart + Hill-Sachs (axial)</text>
  <text x="330" y="62" text-anchor="middle" fill="#9fb6cc" font-size="12">Axial through the mid-glenoid — anterior is to the LEFT, posterior to the RIGHT</text>

  <rect x="120" y="80" width="420" height="300" fill="#0f0f23" stroke="#333" rx="6"/>

  <!-- Glenoid (vertical, left) -->
  <path d="M205,140 q-26,90 0,180" fill="none" stroke="#5a6079" stroke-width="14" stroke-linecap="round"/>
  <text x="150" y="235" text-anchor="middle" fill="#7f8aa3" font-size="10">glenoid</text>

  <!-- Humeral head (round, right) -->
  <circle cx="370" cy="230" r="95" fill="#3a3f55"/>
  <text x="402" y="234" text-anchor="middle" fill="#8b93ac" font-size="11">humeral head</text>

  <!-- Normal posterior labrum (intact triangle) -->
  <path d="M214,150 l16,8 l-16,8 Z" fill="#6f76d6"/>
  <!-- Anteroinferior labrum: BANKART (detached/displaced) -->
  <path d="M214,300 l18,10 l-18,9 Z" fill="#9aa0e8" transform="translate(10,6)"/>
  <line x1="150" y1="330" x2="226" y2="314" stroke="#FFD100" stroke-width="2" marker-end="url(#bY)"/>
  <text x="150" y="346" text-anchor="middle" fill="#FFD100" font-size="11" font-weight="bold">Bankart</text>
  <text x="150" y="360" text-anchor="middle" fill="#FFD100" font-size="9">anteroinferior labrum</text>

  <!-- Hill-Sachs: posterolateral humeral head impaction (notch on right/posterolateral) -->
  <path d="M455,196 q-26,10 -22,40 q20,-6 30,-22 Z" fill="#0f0f23"/>
  <line x1="520" y1="180" x2="462" y2="208" stroke="#fff" stroke-width="2" marker-end="url(#bW)"/>
  <text x="528" y="176" text-anchor="middle" fill="#cfe3f5" font-size="11" font-weight="bold">Hill-Sachs</text>
  <text x="528" y="190" text-anchor="middle" fill="#cfe3f5" font-size="9">posterolateral</text>
  <text x="528" y="201" text-anchor="middle" fill="#cfe3f5" font-size="9">impaction</text>

  <!-- direction labels -->
  <text x="138" y="100" fill="#5b6680" font-size="10">ANTERIOR</text>
  <text x="470" y="100" fill="#5b6680" font-size="10" text-anchor="end">POSTERIOR</text>

  <text x="330" y="402" text-anchor="middle" fill="#cfe3f5" font-size="11">First-time dislocation: don't stop at the labrum — grade glenoid bone loss &amp; look for an engaging Hill-Sachs</text>
  <text x="330" y="424" text-anchor="middle" fill="#5b6680" font-size="10">UCLA Shoulder MRI Course — original teaching illustration (schematic)</text>
</svg>
